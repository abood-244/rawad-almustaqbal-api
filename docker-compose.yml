services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rawad-almustaqbal-api
    container_name: rawad-almustaqbal-api-app
    restart: unless-stopped
    ports:
      - "8000:10000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: stone_treasures_local
      DB_USERNAME: postgres
      DB_PASSWORD: "1234"
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    container_name: rawad-almustaqbal-api-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: stone_treasures_local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
    ports:
      - "2440:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stone_treasures_local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data: