version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: abuturki-api
    container_name: abuturki-api-app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=abuturki
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    volumes:
      - .:/var/www/html
      # Ignore vendor directory from host so container uses its own
      - /var/www/html/vendor
    depends_on:
      - db
    networks:
      - abuturki-network

  db:
    image: mysql:8.0
    container_name: abuturki-api-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: abuturki
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - abuturki-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: abuturki-api-pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: secret
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - abuturki-network

networks:
  abuturki-network:
    driver: bridge

volumes:
  db_data:
